<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EduTranscribe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider:before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
        }

        .registro-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .registro-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .registro-section p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn-registro {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-registro:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .back-home {
            text-align: center;
            margin-top: 25px;
        }

        .back-home a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-home a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 30px 25px;
            }

            .logo h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>🎓 EduTranscribe</h1>
            <p>Iniciar Sesión</p>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Tu contraseña">
            </div>

            <button type="submit" class="btn" id="loginBtn">Ingresar</button>
        </form>

        <div class="divider">
            <span>¿No tienes cuenta?</span>
        </div>

        <div class="registro-section">
            <h3>🎓 Únete como Docente</h3>
            <p>Crea tu cuenta gratis y comienza a grabar, transcribir y organizar tus clases con IA.</p>
            <a href="/registro" class="btn-registro">Crear Cuenta Gratis</a>
        </div>

        <div class="back-home">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>

    <script>
        async function login(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Iniciando sesión...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    mostrarMensaje('¡Bienvenido! Redirigiendo...', 'success');
                    setTimeout(() => {
                        window.location.href = '/docente';
                    }, 1000);
                } else {
                    mostrarMensaje(data.error || 'Credenciales incorrectas', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Ingresar';
                }
            } catch (error) {
                mostrarMensaje('Error de conexión. Intenta nuevamente.', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Ingresar';
            }
        }
        
        function mostrarMensaje(texto, tipo) {
            const mensaje = document.getElementById('message');
            mensaje.textContent = texto;
            mensaje.className = 'message ' + tipo;
        }
    </script>
</body>
</html>
